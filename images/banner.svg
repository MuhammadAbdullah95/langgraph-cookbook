<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="LangGraph Cookbook — six agentic design patterns plus Agentic RAG">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2727"/>
      <stop offset="55%" stop-color="#1C3C3C"/>
      <stop offset="100%" stop-color="#0A1B1B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5EE6B5"/>
      <stop offset="100%" stop-color="#2A9D8F"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#5EE6B5" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#5EE6B5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- TEXT COLUMN — kept inside x = 64 .. 820 -->
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif" fill="#FFFFFF">
    <text x="64" y="96" font-size="20" font-weight="600" letter-spacing="6" fill="#5EE6B5" opacity="0.85">A LANGGRAPH COOKBOOK</text>
    <text x="64" y="186" font-size="74" font-weight="800" letter-spacing="-1.5">Build Real Agents.</text>
    <text x="64" y="232" font-size="28" font-weight="500" fill="#C7E9DD">6 agentic design patterns &#183; Agentic RAG</text>
    <text x="64" y="270" font-size="20" font-weight="400" fill="#8FB7AB">Runnable notebooks &#183; plain-language explanations</text>
    <text x="64" y="314" font-size="16" font-weight="400" fill="#6B9890" opacity="0.85">A practical companion to the official LangChain docs.</text>
  </g>

  <!-- GRAPH MOTIF — contained in the right column x = 900 .. 1216, no overlap with text -->
  <g transform="translate(920, 96)" fill="none" stroke="#5EE6B5" stroke-width="2.4" opacity="0.9">
    <!-- edges first so node fills sit on top -->
    <line x1="40"  y1="84"  x2="140" y2="30"  opacity="0.45"/>
    <line x1="40"  y1="84"  x2="140" y2="138" opacity="0.45"/>
    <line x1="140" y1="30"  x2="240" y2="84"  opacity="0.45"/>
    <line x1="140" y1="138" x2="240" y2="84"  opacity="0.45"/>
    <line x1="240" y1="84"  x2="340" y2="138" opacity="0.45"/>
    <line x1="240" y1="84"  x2="340" y2="30"  opacity="0.45"/>
    <!-- self-loop on the agent node -->
    <path d="M 358 18 a 18 18 0 1 1 -0.01 0" opacity="0.55"/>

    <!-- nodes (outer ring) -->
    <g fill="#0F2727" stroke="url(#accent)" stroke-width="2.6">
      <circle cx="40"  cy="84"  r="18"/>
      <circle cx="140" cy="30"  r="18"/>
      <circle cx="140" cy="138" r="18"/>
      <circle cx="240" cy="84"  r="18"/>
      <circle cx="340" cy="30"  r="18"/>
      <circle cx="340" cy="138" r="18"/>
    </g>
    <!-- node centers -->
    <g fill="#5EE6B5" stroke="none">
      <circle cx="40"  cy="84"  r="5"/>
      <circle cx="140" cy="30"  r="5"/>
      <circle cx="140" cy="138" r="5"/>
      <circle cx="240" cy="84"  r="5"/>
      <circle cx="340" cy="30"  r="5"/>
      <circle cx="340" cy="138" r="5"/>
    </g>
  </g>

  <!-- bottom accent stripe -->
  <rect x="0" y="354" width="1280" height="6" fill="url(#accent)"/>
</svg>
